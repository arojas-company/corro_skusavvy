name: Update SKUSavvy Dashboard Data

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 6:00 AM UTC.
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard data from SKUSavvy
        env:
          SKUSAVVY_TOKEN: ${{ secrets.SKUSAVVY_TOKEN }}
          PAGE_SIZE: "100"
          MAX_PAGES: "250"
        run: |
          mkdir -p data
          python scripts/generate_data.py
          touch .nojekyll

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data .nojekyll
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update SKUSavvy dashboard data"
            git push
          fi
