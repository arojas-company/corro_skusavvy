<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Intelligence — SKUSavvy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d0f12;--surface:#15171b;--surface2:#1c2027;--text:#f2f4f8;--muted:#8b95a7;--border:rgba(255,255,255,.09);--accent:#4ade80;--blue:#7c83ff;--red:#ff637d;--orange:#ff933d;--cyan:#22d3ee;--shadow:0 12px 28px rgba(0,0,0,.22);--font-display:'Syne',sans-serif;--font-mono:'DM Mono',monospace}
    body.light{--bg:#f5f7fb;--surface:#fff;--surface2:#edf1f7;--text:#111827;--muted:#687386;--border:rgba(15,23,42,.13);--shadow:0 12px 26px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:12px;line-height:1.45}.top{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border)}
    .header{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:18px 24px}.brand{display:flex;align-items:center;gap:12px}.dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px var(--accent)}h1{font:800 24px var(--font-display);margin:0}.sub{color:var(--muted);margin-top:2px}.controls{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.controls label{color:var(--muted)}select,input,button{font-family:var(--font-mono);border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:10px 12px;font-weight:700}button{cursor:pointer}.refresh{background:var(--accent);color:#07110b;border-color:transparent}.manual{background:var(--surface2);color:var(--text)}.theme{min-width:78px}.stats{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--border)}.stat{padding:16px 20px;border-right:1px solid var(--border);background:var(--surface)}.stat:last-child{border-right:0}.stat-label{color:var(--muted);text-transform:uppercase;letter-spacing:.09em;font-size:10px}.stat-val{font:800 24px var(--font-display);margin-top:6px}.blue{color:var(--blue)}.red{color:var(--red)}.orange{color:var(--orange)}
    .tabs{display:flex;gap:8px;overflow:auto;padding:0 24px;border-bottom:1px solid var(--border)}.tab{padding:14px 18px;border:0;border-bottom:2px solid transparent;background:transparent;color:var(--muted);white-space:nowrap}.tab.active{color:var(--text);border-bottom-color:var(--accent)}.tab:before{content:'●';color:var(--accent);margin-right:8px}.wrap{padding:18px 24px}.filters{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}.search{min-width:300px;max-width:420px;flex:1}.hint{color:var(--muted);font-size:11px}.count{margin-left:auto;color:var(--muted)}.notice{display:none;border:1px solid var(--border);border-radius:12px;background:rgba(255,147,61,.08);padding:12px 14px;margin-bottom:14px;color:#ffd0ad}.notice.ok{background:rgba(74,222,128,.08);color:#bffad0}.notice.info{background:rgba(124,131,255,.08);color:#d5d8ff}
    .grid-table{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}.grid-head,.grid-row{display:grid;align-items:stretch}.grid-head{background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:10px}.cell{padding:10px 11px;border-right:1px solid var(--border);min-width:0;overflow-wrap:anywhere;word-break:normal}.cell:last-child{border-right:0}.grid-row{border-bottom:1px solid var(--border)}.grid-row:last-child{border-bottom:0}.grid-row:hover{background:rgba(74,222,128,.035)}.bold{font-weight:800}.muted{color:var(--muted)}.money{color:var(--accent);font-weight:800}.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800}.active-b{background:rgba(74,222,128,.13);color:var(--accent)}.archived-b,.draft-b,.fallback-b{background:rgba(148,163,184,.16);color:var(--muted)}.risk-b{background:rgba(255,99,125,.16);color:var(--red)}.warn-b{background:rgba(255,147,61,.16);color:var(--orange)}.empty,.error{padding:34px;text-align:center;color:var(--muted)}.error{color:var(--red);background:rgba(255,99,125,.08)}
    .cols-turnover{grid-template-columns:minmax(82px,.8fr) minmax(190px,2fr) minmax(145px,1.2fr) minmax(64px,.55fr) minmax(80px,.7fr) minmax(90px,.8fr) minmax(90px,.8fr) minmax(82px,.7fr) minmax(82px,.7fr) minmax(82px,.7fr) minmax(72px,.65fr) minmax(72px,.6fr)}
    .cols-best{grid-template-columns:minmax(42px,.35fr) minmax(82px,.75fr) minmax(190px,2fr) minmax(145px,1.2fr) minmax(80px,.72fr) minmax(82px,.72fr) minmax(90px,.75fr) minmax(82px,.72fr) minmax(72px,.6fr) minmax(72px,.6fr)}
    .cols-slow{grid-template-columns:minmax(82px,.8fr) minmax(210px,2.2fr) minmax(145px,1.2fr) minmax(64px,.55fr) minmax(82px,.7fr) minmax(86px,.75fr) minmax(100px,.85fr) minmax(80px,.7fr)}
    .cols-damaged{grid-template-columns:minmax(82px,.8fr) minmax(190px,2.2fr) minmax(145px,1.2fr) minmax(78px,.7fr) minmax(90px,.8fr) minmax(90px,.8fr)}
    @media(max-width:1200px){body{font-size:11px}.header{align-items:flex-start}.stats{grid-template-columns:repeat(3,1fr)}.cell{padding:8px 7px}.grid-head{display:none}.grid-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))!important;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;padding:8px}.cell{border:0;padding:6px}.cell:before{content:attr(data-label);display:block;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}.controls{grid-template-columns:1fr 1fr;display:grid;width:100%}}
    @media(max-width:760px){.header,.controls,.filters{display:grid;grid-template-columns:1fr;width:100%}.search{min-width:0}.stats{grid-template-columns:repeat(2,1fr)}.wrap{padding:14px 10px}.tabs{padding:0 10px}.grid-row{grid-template-columns:1fr!important}.stat{padding:12px}.stat-val{font-size:20px}}
  </style>
</head>
<body>
  <div class="top">
    <header class="header">
      <div class="brand"><div class="dot"></div><div><h1>Inventory Intelligence</h1><div class="sub">SKUSavvy × Shopify — Static GitHub Pages Dashboard</div></div></div>
      <div class="controls">
        <label>Month</label><select id="monthPicker"></select>
        <label>Warehouse</label><select id="warehousePicker"></select>
        <label>Status</label><select id="statusTop"><option value="active">Active only</option><option value="all">All statuses</option><option value="in_stock">Active + In stock</option><option value="low_stock">Active + Low stock</option><option value="out_of_stock">Active + Out of stock</option><option value="archived">Archived</option><option value="draft">Draft</option></select>
        <button class="theme" id="themeBtn">Light</button><button class="manual" onclick="openManualRefresh()">⚡ Update now</button><button class="refresh" onclick="loadData(true)">↻ Reload data</button>
      </div>
    </header>
    <section class="stats">
      <div class="stat"><div class="stat-label">Active SKUs</div><div class="stat-val blue" id="stat-total">—</div></div>
      <div class="stat"><div class="stat-label">Stockout Risk</div><div class="stat-val red" id="stat-risk">—</div></div>
      <div class="stat"><div class="stat-label">Slow Movers</div><div class="stat-val orange" id="stat-slow">—</div></div>
      <div class="stat"><div class="stat-label">COGS / Cost</div><div class="stat-val orange" id="stat-capital">—</div></div>
      <div class="stat"><div class="stat-label">Sales Month</div><div class="stat-val" id="stat-sales">—</div></div>
    </section>
    <nav class="tabs">
      <button class="tab active" data-tab="turnover">Inventory Turnover</button>
      <button class="tab" data-tab="damaged">Damaged / Expired</button>
      <button class="tab" data-tab="best">Best Sellers</button>
      <button class="tab" data-tab="slow">Slow Movers</button>
    </nav>
  </div>

  <main class="wrap">
    <div id="notice" class="notice"></div>
    <div class="filters">
      <input class="search" id="search" placeholder="Search SKU, product, category..." />
      <select id="localFilter"></select>
      <span class="hint">Default warehouse: Wellington Warehouse. COGS = SKUSavvy warehouse Qty.cost total. Sales are zero before a warehouse start date.</span>
      <span class="count" id="count">—</span><span class="hint" id="syncStatus"></span>
    </div>
    <section id="table" class="grid-table"><div class="empty">Loading data...</div></section>
  </main>

<script>
const DEFAULT_WAREHOUSE = '019b6b44-4eea-7613-9f82-9af97d2d255d';
const LOCAL_WAREHOUSE_START_DATES = {
  '019e03cc-afca-721a-a553-1946248e9883': '2026-06-01', // Corro Trailer 1
  '019b6b44-4eea-7613-9f82-9af97d2d255d': '1900-01-01', // Wellington Warehouse
  '019b6b44-4eba-72db-9c86-a971207c9559': '1900-01-01' // Drop Ship
};
const state = { tab:'turnover', raw:null, rows:{turnover:[], damaged:[], best:[], slow:[]}, filtered:[] };
const labels = {
  turnover:['SKU','Product','Warehouse','Stock','Unit Cost','COGS','Retail Value','Sales Month','Sales $','Coverage','Margin','Status'],
  best:['#','SKU','Product','Warehouse','Sales Month','Avg Daily','Revenue Month','Stock','Coverage','Status'],
  slow:['SKU','Product','Warehouse','Stock','Sales Month','Days No Sale','COGS','Action'],
  damaged:['Date','SKU','Product','Reason','Units Lost','Total Loss']
};
const classes = { turnover:'cols-turnover', best:'cols-best', slow:'cols-slow', damaged:'cols-damaged' };
function fmt(n){n=Number(n||0); if(n>=1e6)return (n/1e6).toFixed(1)+'M'; if(n>=1e3)return (n/1e3).toFixed(1)+'k'; return n.toLocaleString(undefined,{maximumFractionDigits:2});}
function money(n){return '$'+fmt(n)}
function badge(text, cls){return `<span class="badge ${cls}">${text}</span>`}
function monthInfo(){const val=document.getElementById('monthPicker').value; const now=new Date(); const current=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`; const [y,m]=val.split('-').map(Number); const start=new Date(y,m-1,1); const endOfMonth=new Date(y,m,0); const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const end=val===current?today:endOfMonth; const days=Math.max(1,Math.round((end-start)/86400000)+1); return {month:val,start,end,days};}
function activeDaysForWarehouse(wid,date){if(wid==='all')return date.days; const startDates={...LOCAL_WAREHOUSE_START_DATES,...(state.raw?.warehouseStartDates||{})}; const startStr=startDates[wid]; if(!startStr)return date.days; const whStart=new Date(startStr+'T00:00:00'); if(date.end<whStart)return 0; const effectiveStart=date.start<whStart?whStart:date.start; return Math.max(0,Math.round((date.end-effectiveStart)/86400000)+1);}
function monthOptions(){const s=document.getElementById('monthPicker'); const now=new Date(); let html=''; for(let i=0;i<18;i++){const d=new Date(now.getFullYear(), now.getMonth()-i, 1); const val=d.toISOString().slice(0,7); const label=d.toLocaleDateString('en-US',{month:'long',year:'numeric'}); html += `<option value="${val}">${label}</option>`;} s.innerHTML=html;}
function currentWarehouse(){return document.getElementById('warehousePicker').value || DEFAULT_WAREHOUSE;}
function warehouseName(id){return id==='all'?'All Warehouses':(state.raw?.warehouses||[]).find(w=>w.id===id)?.name || 'Wellington Warehouse';}
function hasWarehouseStock(id){return !!(state.raw?.warehouseDataStatus==='ok' && id!=='all' && (state.raw?.warehouses||[]).some(w=>w.id===id));}
function stockFor(r, wid){ if(wid==='all') return Number(r.totalStock||0); return Number((r.stockByWarehouse||{})[wid] ?? 0); }
function showNotice(kind, text){const n=document.getElementById('notice'); n.className='notice '+(kind||''); n.style.display='block'; n.innerHTML=text;}
function hideNotice(){document.getElementById('notice').style.display='none';}
function updateWarehouseOptions(){const sel=document.getElementById('warehousePicker'); const list=state.raw?.warehouses?.length?state.raw.warehouses:[{id:DEFAULT_WAREHOUSE,name:'Wellington Warehouse'}]; sel.innerHTML=list.map(w=>`<option value="${w.id}">${w.name}</option>`).join('')+'<option value="all">All Warehouses</option>'; sel.value=state.raw?.defaultWarehouseId || DEFAULT_WAREHOUSE;}
function normalize(r, index){const date=monthInfo(); const wid=currentWarehouse(); const stock=stockFor(r,wid); const avg=Number(r.avgDailySales||0); const activeDays=activeDaysForWarehouse(wid,date); const unitsSold=Number((avg*activeDays).toFixed(2)); const price=Number(r.price||0); const whUnitCost=Number((r.unitCostByWarehouse||{})[wid]||0); const unitCost=wid==='all'?Number(r.unitCost||0):(whUnitCost||Number(r.unitCost||0)); const revenue=Number((unitsSold*price).toFixed(2)); const whCostValue=Number((r.costValueByWarehouse||{})[wid]||0); const cogsValue=wid==='all'?Number(r.costValueTotal||stock*unitCost||0):Number((whCostValue || (stock*unitCost)).toFixed(2)); const retailValue=Number((stock*price).toFixed(2)); const marginPct=(retailValue>0&&cogsValue>0)?Number((((retailValue-cogsValue)/retailValue)*100).toFixed(1)):((price>0&&unitCost>0)?Number((((price-unitCost)/price)*100).toFixed(1)):null); const daysCoverage=avg>0?Math.round(stock/avg):null; const status=String(r.productStatus||'active').toLowerCase(); const stockoutRisk=status==='active' && (stock<=2 || (daysCoverage!==null && daysCoverage<=14)); const slowMover=status==='active' && avg<=0.05 && stock>0; return {...r,rank:index+1,warehouseName:warehouseName(wid),stockAvailable:stock,activeDays,unitsSold,revenueGenerated:revenue,inventoryValue:cogsValue,cogsValue,retailValue,unitCost,marginPct,turnoverRate:stock>0?Number((unitsSold/Math.max(stock,1)).toFixed(2)):unitsSold,daysOfCoverage:daysCoverage,stockoutRisk,reorderAlert:stockoutRisk,immobilizedCapital:cogsValue,daysSinceLastSale:avg<=0.05?90:10,suspendReorder:slowMover};}
function filterStatus(rows, status='active'){const s=String(status||'active').toLowerCase(); const wid=currentWarehouse(); const whMapped=hasWarehouseStock(wid); if(s==='all')return whMapped?rows.filter(r=>r.stockAvailable>0):rows; if(s==='active')return rows.filter(r=>r.productStatus==='active'&&(!whMapped||r.stockAvailable>0)); if(s==='in_stock')return rows.filter(r=>r.productStatus==='active'&&r.stockAvailable>0); if(s==='out_of_stock')return rows.filter(r=>r.productStatus==='active'&&r.stockAvailable<=0); if(s==='low_stock')return rows.filter(r=>r.productStatus==='active'&&r.stockAvailable>0&&r.stockAvailable<=2); return rows.filter(r=>r.productStatus===s&&(!whMapped||r.stockAvailable>0));}
function buildRows(){let rows=(state.raw?.rows||[]).map((r,i)=>normalize(r,i)); rows=filterStatus(rows,document.getElementById('statusTop').value); state.rows.turnover=rows; state.rows.best=rows.filter(r=>r.unitsSold>0).sort((a,b)=>b.unitsSold-a.unitsSold).map((r,i)=>({...r,rank:i+1})); state.rows.slow=rows.filter(r=>r.productStatus==='active'&&r.suspendReorder).sort((a,b)=>b.immobilizedCapital-a.immobilizedCapital); state.rows.damaged=[]; updateStats(); updateFilterOptions(); applyFilters();}
function updateStats(){const r=state.rows.turnover; document.getElementById('stat-total').textContent=fmt(r.length); document.getElementById('stat-risk').textContent=fmt(r.filter(x=>x.stockoutRisk).length); document.getElementById('stat-slow').textContent=fmt(state.rows.slow.length); document.getElementById('stat-capital').textContent=money(r.reduce((s,x)=>s+(x.inventoryValue||0),0)); document.getElementById('stat-sales').textContent=money(r.reduce((s,x)=>s+(x.revenueGenerated||0),0));}
function updateFilterOptions(){const f=document.getElementById('localFilter'); const t=state.tab; if(t==='turnover') f.innerHTML='<option value="all">All products</option><option value="reorder">Needs reorder</option><option value="stock">In stock</option><option value="zero">Out of stock</option>'; if(t==='best') f.innerHTML='<option value="all">All</option><option value="risk">Stockout risk</option><option value="stock">In stock</option>'; if(t==='slow') f.innerHTML='<option value="all">All slow movers</option><option value="suspend">Suspend reorder</option><option value="capital">Highest capital</option>'; if(t==='damaged') f.innerHTML='<option value="all">All reasons</option><option value="damaged">Damaged</option><option value="expired">Expired</option>';}
function applyFilters(){let rows=[...state.rows[state.tab]]; const q=document.getElementById('search').value.toLowerCase(); const lf=document.getElementById('localFilter').value; if(q) rows=rows.filter(x=>[x.sku,x.productName,x.category,x.productStatus,x.warehouseName].some(v=>String(v||'').toLowerCase().includes(q))); if(lf==='reorder'||lf==='risk') rows=rows.filter(x=>x.stockoutRisk); if(lf==='stock') rows=rows.filter(x=>x.stockAvailable>0); if(lf==='zero') rows=rows.filter(x=>x.stockAvailable<=0); if(lf==='suspend') rows=rows.filter(x=>x.suspendReorder); if(lf==='capital') rows.sort((a,b)=>(b.immobilizedCapital||0)-(a.immobilizedCapital||0)); state.filtered=rows; render();}
function cells(arr, tab){return arr.map((v,i)=>`<div class="cell" data-label="${labels[tab][i]||''}">${v??'—'}</div>`).join('');}
function statusBadge(r){ if(r.stockoutRisk) return badge('Risk','risk-b'); return badge(r.productStatus||'active', r.productStatus==='active'?'active-b':'archived-b');}
function marginText(r){return r.marginPct==null?'—':fmt(r.marginPct)+'%';}
function render(){const tab=state.tab; const rows=state.filtered; document.getElementById('count').textContent=fmt(rows.length)+' products'; if(!rows.length){document.getElementById('table').innerHTML='<div class="empty">No data found</div>';return;} let html=`<div class="grid-head ${classes[tab]}">${labels[tab].map(x=>`<div class="cell">${x}</div>`).join('')}</div>`; html += rows.map(r=>`<div class="grid-row ${classes[tab]}">${rowHTML(tab,r)}</div>`).join(''); document.getElementById('table').innerHTML=html;}
function rowHTML(tab,r){
  if(tab==='turnover') return cells([r.sku,`<span class="bold">${r.productName}</span><span class="muted">${r.category}</span>`, r.warehouseName, fmt(r.stockAvailable), money(r.unitCost), `<span class="money">${money(r.cogsValue)}</span>`, money(r.retailValue), fmt(r.unitsSold), `<span class="money">${money(r.revenueGenerated)}</span>`, r.daysOfCoverage!=null?fmt(r.daysOfCoverage)+' days':'—', marginText(r), statusBadge(r)],tab);
  if(tab==='best') return cells(['#'+r.rank,r.sku,`<span class="bold">${r.productName}</span><span class="muted">${r.category}</span>`,r.warehouseName,fmt(r.unitsSold),fmt(r.avgDailySales)+'/day',`<span class="money">${money(r.revenueGenerated)}</span>`,fmt(r.stockAvailable),r.daysOfCoverage!=null?fmt(r.daysOfCoverage)+' days':'—',statusBadge(r)],tab);
  if(tab==='slow') return cells([r.sku,`<span class="bold">${r.productName}</span><span class="muted">${r.category}</span>`,r.warehouseName,fmt(r.stockAvailable),fmt(r.unitsSold),fmt(r.daysSinceLastSale)+' days',`<span class="money">${money(r.immobilizedCapital)}</span>`,badge('Suspend reorder','warn-b')],tab);
  return cells(['—','—','—','Pending SKUSavvy loss log mapping','0',money(0)],tab);
}
function githubActionsUrl(){const host=window.location.hostname; const parts=window.location.pathname.split('/').filter(Boolean); if(host.endsWith('.github.io')&&parts.length){const owner=host.replace('.github.io',''); return `https://github.com/${owner}/${parts[0]}/actions/workflows/update-dashboard.yml`;} return 'https://github.com/';}
function openManualRefresh(){showNotice('info','To update right now: GitHub Actions will open. Click <b>Run workflow</b>. When it finishes, return here and click <b>Reload data</b>.'); window.open(githubActionsUrl(),'_blank');}
async function loadData(force=false){document.getElementById('table').innerHTML='<div class="empty">Loading data...</div>'; try{const res=await fetch('./data/dashboard.json?ts='+(force?Date.now():'0')); state.raw=await res.json(); if(state.raw.error){document.getElementById('table').innerHTML='<div class="error">'+state.raw.error+'</div>'; return;} updateWarehouseOptions(); document.getElementById('syncStatus').textContent='Last update: '+(state.raw.generatedAt||'—'); if(state.raw.warehouseDataStatus==='ok'){showNotice('ok','Warehouse filter loaded from SKUSavvy using <b>Variant.inventory / InventoryQty.quantity</b>. COGS is calculated from <b>SKUSavvy Qty.cost total by warehouse</b>; no reference totals are hardcoded. Sales are zero before the warehouse start date.');} else {showNotice('', 'Warehouse-level inventory is loaded from SKUSavvy InventoryQty.quantity by warehouse. If numbers do not match, run the workflow again and validate a sample SKU in SKUSavvy Warehouse → Inventory.');} buildRows();}catch(e){document.getElementById('table').innerHTML='<div class="error">Could not load data/dashboard.json: '+e.message+'</div>';}}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); state.tab=b.dataset.tab; updateFilterOptions(); applyFilters();});
document.getElementById('search').oninput=applyFilters; document.getElementById('localFilter').onchange=applyFilters; document.getElementById('statusTop').onchange=buildRows; document.getElementById('warehousePicker').onchange=buildRows; document.getElementById('monthPicker').onchange=buildRows;
document.getElementById('themeBtn').onclick=()=>{document.body.classList.toggle('light'); document.getElementById('themeBtn').textContent=document.body.classList.contains('light')?'Dark':'Light'; localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');};
if(localStorage.getItem('theme')==='light'){document.body.classList.add('light'); document.getElementById('themeBtn').textContent='Dark';}
monthOptions(); updateFilterOptions(); loadData(false);
</script>
</body>
</html>
